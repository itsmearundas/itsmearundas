<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="barGrad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#F7931E"/>
    </linearGradient>
    <style>
      .lbl { font-family: 'Courier New', monospace; font-size: 15px; fill: #c8d8e8; }
      .val { font-family: 'Courier New', monospace; font-size: 15px; font-weight: bold; fill: #FF6B35; }
    </style>
  </defs>

  <!-- Test Accuracy 85.41% -->
  <text class="lbl" x="0" y="18">Test Accuracy</text>
  <rect x="0" y="26" width="600" height="14" rx="7" fill="#1c2129"/>
  <rect x="0" y="26" width="0" height="14" rx="7" fill="url(#barGrad1)">
    <animate attributeName="width" from="0" to="512" dur="1.4s" fill="freeze"/>
  </rect>
  <text class="val" x="615" y="38">85.41%</text>

  <!-- Macro F1-Score 0.85 -->
  <text class="lbl" x="0" y="68">Macro F1-Score</text>
  <rect x="0" y="76" width="600" height="14" rx="7" fill="#1c2129"/>
  <rect x="0" y="76" width="0" height="14" rx="7" fill="url(#barGrad1)">
    <animate attributeName="width" from="0" to="510" dur="1.4s" begin="0.15s" fill="freeze"/>
  </rect>
  <text class="val" x="615" y="88">0.85</text>

  <!-- GPU Inference 43 FPS -->
  <text class="lbl" x="0" y="118">GPU Inference</text>
  <rect x="0" y="126" width="600" height="14" rx="7" fill="#1c2129"/>
  <rect x="0" y="126" width="0" height="14" rx="7" fill="url(#barGrad1)">
    <animate attributeName="width" from="0" to="358" dur="1.4s" begin="0.3s" fill="freeze"/>
  </rect>
  <text class="val" x="615" y="138">43 FPS</text>

  <!-- Object Classes 17 -->
  <text class="lbl" x="0" y="168">Object Classes</text>
  <rect x="0" y="176" width="600" height="14" rx="7" fill="#1c2129"/>
  <rect x="0" y="176" width="0" height="14" rx="7" fill="url(#barGrad1)">
    <animate attributeName="width" from="0" to="425" dur="1.4s" begin="0.45s" fill="freeze"/>
  </rect>
  <text class="val" x="615" y="188">17 classes</text>
</svg>
