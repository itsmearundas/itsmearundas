<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B35">
        <animate attributeName="stop-color" values="#FF6B35;#F7931E;#FF6B35" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#F7931E">
        <animate attributeName="stop-color" values="#F7931E;#FF6B35;#F7931E" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- floating particles -->
  <circle cx="120" cy="70" r="22" fill="#FF6B35" opacity="0.12">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -22; 0 0" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1080" cy="60" r="16" fill="#F7931E" opacity="0.15">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 18; 0 0" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="220" r="12" fill="#F7931E" opacity="0.18">
    <animateTransform attributeName="transform" type="translate" values="0 0; 12 -14; 0 0" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1000" cy="210" r="20" fill="#FF6B35" opacity="0.10">
    <animateTransform attributeName="transform" type="translate" values="0 0; -16 12; 0 0" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="40" r="8" fill="#ffffff" opacity="0.20">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 10; 0 0" dur="4.5s" repeatCount="indefinite"/>
  </circle>

  <text x="600" y="150" text-anchor="middle" font-family="'Segoe UI', Verdana, sans-serif" font-size="76" font-weight="900" fill="url(#heroGrad)" filter="url(#glow)">ARUN DAS</text>
  <text x="600" y="195" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" letter-spacing="2" fill="#c8d8e8">AI / ML ENGINEER &#160;&#183;&#160; FULL-STACK DEVELOPER</text>

  <!-- underline accent -->
  <rect x="470" y="215" width="260" height="3" rx="1.5" fill="url(#heroGrad)">
    <animate attributeName="width" from="0" to="260" dur="1.4s" fill="freeze"/>
  </rect>
</svg>
